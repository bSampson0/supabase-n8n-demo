<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevOps Hub — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
</head>
<body class="bg-gray-950 min-h-screen flex items-center justify-center font-mono">

  <div class="w-full max-w-md px-6">
    <!-- Logo / Header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-2 text-green-400 text-2xl font-bold tracking-tight">
        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
        DevOps Hub
      </div>
      <p class="text-gray-500 text-sm mt-1">Deployment monitoring & automation</p>
    </div>

    <!-- Card -->
    <div class="bg-gray-900 border border-gray-800 rounded-xl p-8">
      <!-- Tab switcher -->
      <div class="flex mb-6 bg-gray-800 rounded-lg p-1">
        <button id="tab-login"
          onclick="showTab('login')"
          class="flex-1 py-2 text-sm rounded-md transition-all bg-green-500 text-gray-950 font-semibold">
          Login
        </button>
        <button id="tab-signup"
          onclick="showTab('signup')"
          class="flex-1 py-2 text-sm rounded-md transition-all text-gray-400 hover:text-gray-200">
          Sign Up
        </button>
      </div>

      <!-- Error / Success message -->
      <div id="message" class="hidden mb-4 px-4 py-3 rounded-lg text-sm"></div>

      <!-- Login Form -->
      <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
        <div>
          <label class="block text-gray-400 text-xs mb-1 uppercase tracking-wider">Email</label>
          <input type="email" id="login-email" required
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-gray-100 text-sm
                   focus:outline-none focus:border-green-500 transition-colors"
            placeholder="you@company.com" />
        </div>
        <div>
          <label class="block text-gray-400 text-xs mb-1 uppercase tracking-wider">Password</label>
          <input type="password" id="login-password" required
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-gray-100 text-sm
                   focus:outline-none focus:border-green-500 transition-colors"
            placeholder="••••••••" />
        </div>
        <button type="submit"
          class="w-full bg-green-500 hover:bg-green-400 text-gray-950 font-semibold py-3 rounded-lg
                 text-sm transition-colors mt-2">
          Login →
        </button>
      </form>

      <!-- Signup Form -->
      <form id="signup-form" onsubmit="handleSignup(event)" class="space-y-4 hidden">
        <div>
          <label class="block text-gray-400 text-xs mb-1 uppercase tracking-wider">Email</label>
          <input type="email" id="signup-email" required
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-gray-100 text-sm
                   focus:outline-none focus:border-green-500 transition-colors"
            placeholder="you@company.com" />
        </div>
        <div>
          <label class="block text-gray-400 text-xs mb-1 uppercase tracking-wider">Password</label>
          <input type="password" id="signup-password" required minlength="6"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-gray-100 text-sm
                   focus:outline-none focus:border-green-500 transition-colors"
            placeholder="Min. 6 characters" />
        </div>
        <button type="submit"
          class="w-full bg-green-500 hover:bg-green-400 text-gray-950 font-semibold py-3 rounded-lg
                 text-sm transition-colors mt-2">
          Create Account →
        </button>
      </form>
    </div>

    <p class="text-center text-gray-600 text-xs mt-6">
      Powered by Supabase + n8n
    </p>
  </div>

  <script>
    // Tab switching is pure DOM — no Supabase dependency, defined first
    function showTab(tab) {
      const loginForm = document.getElementById('login-form')
      const signupForm = document.getElementById('signup-form')
      const loginTab = document.getElementById('tab-login')
      const signupTab = document.getElementById('tab-signup')

      if (tab === 'login') {
        loginForm.classList.remove('hidden')
        signupForm.classList.add('hidden')
        loginTab.classList.add('bg-green-500', 'text-gray-950', 'font-semibold')
        loginTab.classList.remove('text-gray-400')
        signupTab.classList.remove('bg-green-500', 'text-gray-950', 'font-semibold')
        signupTab.classList.add('text-gray-400')
      } else {
        signupForm.classList.remove('hidden')
        loginForm.classList.add('hidden')
        signupTab.classList.add('bg-green-500', 'text-gray-950', 'font-semibold')
        signupTab.classList.remove('text-gray-400')
        loginTab.classList.remove('bg-green-500', 'text-gray-950', 'font-semibold')
        loginTab.classList.add('text-gray-400')
      }
      clearMessage()
    }

    function showMessage(text, type) {
      const el = document.getElementById('message')
      el.textContent = text
      el.className = `mb-4 px-4 py-3 rounded-lg text-sm ${
        type === 'error'
          ? 'bg-red-900/50 border border-red-700 text-red-300'
          : 'bg-green-900/50 border border-green-700 text-green-300'
      }`
      el.classList.remove('hidden')
    }

    function clearMessage() {
      document.getElementById('message').classList.add('hidden')
    }

    // Supabase client — initialized after tab/UI functions so a CDN failure doesn't break the UI
    let supabase
    try {
      supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
      supabase.auth.getSession().then(({ data: { session } }) => {
        if (session) window.location.href = 'dashboard.html'
      })
    } catch (e) {
      showMessage('Could not connect to Supabase. Open this page via a local server (npx serve .), not file://.', 'error')
    }

    async function handleLogin(e) {
      e.preventDefault()
      const email = document.getElementById('login-email').value
      const password = document.getElementById('login-password').value

      const { error } = await supabase.auth.signInWithPassword({ email, password })
      if (error) {
        showMessage(error.message, 'error')
      } else {
        window.location.href = 'dashboard.html'
      }
    }

    async function handleSignup(e) {
      e.preventDefault()
      const email = document.getElementById('signup-email').value
      const password = document.getElementById('signup-password').value
      const btn = e.target.querySelector('button[type="submit"]')
      btn.textContent = 'Creating account...'
      btn.disabled = true

      const { data, error } = await supabase.auth.signUp({ email, password })

      if (error) {
        showMessage(error.message, 'error')
        btn.textContent = 'Create Account →'
        btn.disabled = false
        return
      }

      // If email confirmation is disabled, session is returned immediately
      if (data.session) {
        window.location.href = 'dashboard.html'
        return
      }

      // Email confirmation is enabled — tell the user
      showMessage('Check your email for a confirmation link, then log in.', 'success')
      btn.textContent = 'Create Account →'
      btn.disabled = false
    }
  </script>
</body>
</html>
