# Netlify Build Configuration
# Note: This deploys the client only. The server should be deployed separately
# to a platform that supports Server-Sent Events (SSE) like Render, Railway, or Heroku.

[build]
  # Build only the client
  base = "client"
  command = "npm install && npm run build"
  publish = "dist"

  # Use Node.js 18
  [build.environment]
    NODE_VERSION = "18"

# SPA fallback - serve index.html for all routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
